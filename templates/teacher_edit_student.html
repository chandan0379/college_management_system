<!DOCTYPE html>
<html>
<head>
    <title>Update Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow mx-auto" style="max-width:600px;">

        <div class="card-header">
            <h2>Update Student</h2>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Name</label>
                    <input
                        type="text"
                        class="form-control"
                        value="{{ student.name }}"
                        readonly>
                </div>

                <div class="mb-3">
                    <label>Attendance</label>
                    <input
                        type="number"
                        name="attendance"
                        class="form-control"
                        value="{{ student.attendance }}"
                        required>
                </div>

                <div class="mb-3">
                    <label>Marks</label>
                    <input
                        type="number"
                        name="marks"
                        class="form-control"
                        value="{{ student.marks }}"
                        required>
                </div>

                <button class="btn btn-success w-100">
                    Update Student
                </button>

            </form>

        </div>

    </div>

</div>

</body>

</html>
