<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
            min-height:100vh;
            display:flex;
            align-items:center;
        }

        .register-card{
            border:none;
            border-radius:25px;
            overflow:hidden;
            box-shadow:0 20px 50px rgba(0,0,0,.35);
        }

        .card-header{
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            color:white;
            text-align:center;
            padding:30px;
            border:none;
        }

        .card-header h3{
            margin:0;
            font-size:36px;
            font-weight:700;
        }

        .card-body{
            padding:35px;
            background:white;
        }

        label{
            font-weight:600;
            margin-bottom:8px;
            color:#1f2937;
        }

        .form-control,
        .form-select{
            border-radius:12px;
            padding:12px;
            border:2px solid #e5e7eb;
            transition:0.3s;
        }

        .form-control:focus,
        .form-select:focus{
            border-color:#2563eb;
            box-shadow:0 0 15px rgba(37,99,235,.25);
        }

        .btn-register{
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            border:none;
            border-radius:12px;
            padding:12px;
            font-size:18px;
            font-weight:600;
            color:white;
            transition:0.3s;
        }

        .btn-register:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(37,99,235,.3);
        }

        .logo{
            font-size:45px;
            margin-bottom:10px;
        }

        .subtitle{
            opacity:.9;
            font-size:14px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-7 col-lg-6">

            <div class="card register-card">

                <div class="card-header">

                    <div class="logo">🎓</div>

                    <h3>Student Registration</h3>

                    <p class="subtitle mb-0">
                        College Management System
                    </p>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">
                            <label>Name</label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                placeholder="Enter full name"
                                required>
                        </div>

                        <div class="mb-3">
                            <label>Email</label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                placeholder="Enter email"
                                required>
                        </div>

                        <div class="mb-3">

                            <label>Department</label>

                            <select
                                name="department"
                                class="form-select"
                                required>

                                <option value="">
                                    Select Department
                                </option>

                                <option value="CSE">CSE</option>
                                <option value="IT">IT</option>
                                <option value="ECE">ECE</option>
                                <option value="ME">ME</option>
                                <option value="CSDS">CSDS</option>
                                <option value="EE">EE</option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label>Roll Number</label>

                            <input
                                type="text"
                                name="roll_number"
                                class="form-control"
                                placeholder="Enter roll number"
                                required>

                        </div>

                        <div class="mb-4">

                            <label>Password</label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Enter password"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-register w-100">

                            Register Student

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
