<!DOCTYPE html>
<html>
<head>
    <title>Teacher Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow mx-auto" style="max-width:500px">

        <div class="card-header text-center">
            <h2>Teacher Login</h2>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email"
                           name="email"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input type="password"
                           name="password"
                           class="form-control"
                           required>
                </div>

                <button class="btn btn-primary w-100">
                    Login
                </button>

            </form>

        </div>

    </div>

</div>

</body>

</html>
