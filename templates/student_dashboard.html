<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <span class="navbar-brand fw-bold">
            🎓 College Management System
        </span>
    </div>
</nav>

<div class="container mt-5">

    <div class="row">

        <div class="col-md-4 mb-4">
            <div class="card stat-card attendance">
                <div class="card-body">
                    <h4>Attendance</h4>
                    <h1>85%</h1>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-4">
            <div class="card stat-card marks">
                <div class="card-body">
                    <h4>Marks</h4>
                    <h1>420</h1>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-4">
            <div class="card stat-card courses">
                <div class="card-body">
                    <h4>Courses</h4>
                    <h1>5</h1>
                </div>
            </div>
        </div>

    </div>

    <div class="card welcome-card shadow-lg">
        <div class="card-body">
            <h3>Welcome Student 👋</h3>
            <p class="text-muted">
                You have successfully logged into your dashboard.
            </p>

            <hr>

            <div class="row text-center">

                <div class="col-md-4">
                    <h5>Department</h5>
                    <p>Information Technology</p>
                </div>

                <div class="col-md-4">
                    <h5>Semester</h5>
                    <p>4th Semester</p>
                </div>

                <div class="col-md-4">
                    <h5>Status</h5>
                    <p class="text-success fw-bold">Active</p>
                </div>

            </div>
        </div>
    </div>

</div>

</body>
</html>
