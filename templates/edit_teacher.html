<!DOCTYPE html>
<html>

<head>
    <title>Edit Teacher</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow mx-auto" style="max-width:600px;">

        <div class="card-header text-center">
            <h2>Edit Teacher</h2>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Name</label>
                    <input type="text"
                           name="name"
                           class="form-control"
                           value="{{ teacher.name }}"
                           required>
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email"
                           name="email"
                           class="form-control"
                           value="{{ teacher.email }}"
                           required>
                </div>

                <div class="mb-3">
                    <label>Subject</label>
                    <input type="text"
                           name="subject"
                           class="form-control"
                           value="{{ teacher.subject }}"
                           required>
                </div>

                <button class="btn btn-primary w-100">
                    Update Teacher
                </button>

            </form>

        </div>

    </div>

</div>

</body>

</html>
