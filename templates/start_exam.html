<!DOCTYPE html>
<html>

<head>

<title>Start Exam</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f7fb;
}

.card{
    max-width:900px;
    margin:auto;
    margin-top:40px;
    border:none;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.card-header{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    text-align:center;
    padding:20px;
}

.question-box{
    border:1px solid #ddd;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
    background:white;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="card-header">

<h2>📝 Online Examination</h2>

</div>

<div class="card-body">

<form method="POST">

{% for q in questions %}

<div class="question-box">

<h5>

Q{{ loop.index }}.
{{ q.question }}

</h5>

<br>

<div class="form-check">

<input class="form-check-input"
type="radio"
name="question_{{ q.id }}"
value="A">

<label class="form-check-label">

{{ q.option_a }}

</label>

</div>

<div class="form-check">

<input class="form-check-input"
type="radio"
name="question_{{ q.id }}"
value="B">

<label class="form-check-label">

{{ q.option_b }}

</label>

</div>

<div class="form-check">

<input class="form-check-input"
type="radio"
name="question_{{ q.id }}"
value="C">

<label class="form-check-label">

{{ q.option_c }}

</label>

</div>

<div class="form-check">

<input class="form-check-input"
type="radio"
name="question_{{ q.id }}"
value="D">

<label class="form-check-label">

{{ q.option_d }}

</label>

</div>

</div>

{% endfor %}

<button
class="btn btn-success w-100">

Submit Exam

</button>

</form>

</div>

</div>

</div>

</body>

</html>
