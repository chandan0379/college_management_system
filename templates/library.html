<!DOCTYPE html>
<html>
<head>
    <title>Library</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">Library Management</h1>

    <a href="/add_book" class="btn btn-success mb-3">
        Add Book
    </a>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Book</th>
                <th>Author</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>

        {% for book in books %}

            <tr>
                <td>{{ book.id }}</td>
                <td>{{ book.title }}</td>
                <td>{{ book.author }}</td>
                <td>{{ book.category }}</td>
                <td>{{ book.quantity }}</td>
  <td>
    <a href="/issue_book/{{ book.id }}"
       class="btn btn-primary btn-sm">
       Issue
    </a>

    <a href="/delete_book/{{ book.id }}"
       class="btn btn-danger btn-sm">
       Delete
    </a>
</td>
            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
