<!DOCTYPE html>
<html>

<head>

<title>Exam Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f7fb;
}

.result-card{
    max-width:650px;
    margin:auto;
    margin-top:60px;
    border:none;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.card-header{
    background:linear-gradient(135deg,#16a34a,#22c55e);
    color:white;
    text-align:center;
    padding:25px;
}

.score{
    font-size:55px;
    font-weight:bold;
    color:#2563eb;
}

</style>

</head>

<body>

<div class="container">

<div class="card result-card">

<div class="card-header">

<h2>🎉 Exam Submitted Successfully</h2>

</div>

<div class="card-body text-center">

<h1 class="score">

{{ result.marks }}/{{ result.total }}

</h1>

<h4>

Percentage

</h4>

<h2>

{{ result.percentage }} %

</h2>

<br>

<a href="/student_dashboard"
class="btn btn-primary">

Back to Dashboard

</a>

</div>

</div>

</div>

</body>

</html>
