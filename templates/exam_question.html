<!DOCTYPE html>
<html>

<head>

    <title>Online Examination</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f7fb;
        }

        .exam-card{
            max-width:900px;
            margin:auto;
            margin-top:50px;
            border:none;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
        }

        .card-header{
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            color:white;
            text-align:center;
            padding:25px;
        }

        .question-box{
            background:#fff;
            border-radius:15px;
            padding:25px;
            border:1px solid #ddd;
        }

        .form-check{
            padding:12px;
            border:1px solid #ddd;
            border-radius:10px;
            margin-bottom:10px;
            transition:.3s;
        }

        .form-check:hover{
            background:#eef4ff;
        }

        .progress{
            height:12px;
            border-radius:20px;
        }

    </style>

</head>

<body>

<div class="container">

<div class="card exam-card">

<div class="card-header">

<h2>📝 Online Examination</h2>

<p>

Question {{ question_no }} of {{ total_questions }}

</p>

<div class="progress">

    <div
        class="progress-bar bg-success"
        role="progressbar"
        style="width: {{ progress }}%;">

    </div>

</div>

</div>

<div class="card-body">

<form method="POST">

<div class="question-box">

<h4>

Q{{ question_no }}.

{{ question.question }}

</h4>

<hr>

<div class="form-check">

<input
class="form-check-input"
type="radio"
name="answer"
value="A">

<label class="form-check-label">

{{ question.option_a }}

</label>

</div>

<div class="form-check">

<input
class="form-check-input"
type="radio"
name="answer"
value="B">

<label>

{{ question.option_b }}

</label>

</div>

<div class="form-check">

<input
class="form-check-input"
type="radio"
name="answer"
value="C">

<label>

{{ question.option_c }}

</label>

</div>

<div class="form-check">

<input
class="form-check-input"
type="radio"
name="answer"
value="D">

<label>

{{ question.option_d }}

</label>

</div>

</div>

<br>

<div class="d-flex justify-content-between">

<button
name="action"
value="skip"
class="btn btn-warning">

Skip

</button>

{% if question_no == total_questions %}

<button
class="btn btn-success">

Finish Exam

</button>

{% else %}

<button
class="btn btn-primary">

Next →

</button>

{% endif %}

</div>

</form>

</div>

</div>

</div>

</body>

</html>
