<!DOCTYPE html>
<html>
<head>
    <title>Student Library</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1>📚 Available Books</h1>

    <table class="table table-bordered mt-4">

        <thead class="table-dark">
            <tr>
                <th>Book</th>
                <th>Author</th>
                <th>Category</th>
                <th>Available</th>
            </tr>
        </thead>

        <tbody>

            {% for book in books %}

            <tr>
                <td>{{ book.title }}</td>
                <td>{{ book.author }}</td>
                <td>{{ book.category }}</td>
                <td>{{ book.quantity }}</td>
            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
