<!DOCTYPE html>
<html>

<head>

    <title>Add Questions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f7fb;
        }

        .card{
            max-width:900px;
            margin:auto;
            margin-top:40px;
            border:none;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
        }

        .card-header{
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            color:white;
            text-align:center;
            padding:25px;
        }

        .card-body{
            padding:30px;
        }

        .form-control,
        .form-select{
            border-radius:10px;
            padding:10px;
        }

        .btn{
            border-radius:10px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

<div class="card">

<div class="card-header">

<h2>📝 Add MCQ Question</h2>

<p class="mb-0">

You can add unlimited questions.

</p>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>

Question

</label>

<textarea
name="question"
class="form-control"
rows="3"
required></textarea>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Option A</label>

<input
type="text"
name="option_a"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Option B</label>

<input
type="text"
name="option_b"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Option C</label>

<input
type="text"
name="option_c"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Option D</label>

<input
type="text"
name="option_d"
class="form-control"
required>

</div>

</div>

<div class="mb-4">

<label>

Correct Answer

</label>

<select
name="correct_answer"
class="form-select">

<option value="A">Option A</option>

<option value="B">Option B</option>

<option value="C">Option C</option>

<option value="D">Option D</option>

</select>

</div>

<button
class="btn btn-success w-100">

➕ Save Question

</button>

<br><br>

<a
href="/exam_list"
class="btn btn-secondary w-100">

Finish

</a>

</form>

</div>

</div>

</div>

</body>

</html>
