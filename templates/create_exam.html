<!DOCTYPE html>
<html>

<head>

    <title>Create MCQ Exam</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f7fb;
        }

        .exam-card{
            max-width:650px;
            margin:auto;
            margin-top:60px;
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 10px 25px rgba(0,0,0,.12);
        }

        .exam-header{
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            color:white;
            padding:25px;
            text-align:center;
        }

        .exam-header h2{
            margin:0;
            font-weight:bold;
        }

        .card-body{
            padding:30px;
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        .btn{
            border-radius:12px;
            font-weight:bold;
            padding:10px;
        }

    </style>

</head>

<body>

<div class="container">

<div class="card exam-card">

<div class="exam-header">

<h2>📝 Create MCQ Exam</h2>

<p class="mb-0">
Create Online Examination for Students
</p>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

Exam Title

</label>

<input
type="text"
name="title"
class="form-control"
placeholder="Example : Python Mid Semester"
required>

</div>

<div class="mb-3">

<label class="form-label">

Subject

</label>

<input
type="text"
name="subject"
class="form-control"
placeholder="Example : Python"
required>

</div>

<div class="mb-4">

<label class="form-label">

Duration (Minutes)

</label>

<input
type="number"
name="duration"
class="form-control"
placeholder="30"
required>

</div>

<div class="d-grid gap-2">

<button
class="btn btn-primary">

Create Exam

</button>

<a
href="/teacher_panel"
class="btn btn-secondary">

Back

</a>

</div>

</form>

</div>

</div>

</div>

</body>

</html>
