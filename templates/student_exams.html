<!DOCTYPE html>
<html>

<head>

<title>Online Exams</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f7fb;
}

.exam-card{
border:none;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,.1);
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">

📝 Available Online Exams

</h2>

<div class="row">

{% for exam in exams %}

<div class="col-md-6">

<div class="card exam-card">

<div class="card-body">

<h4>

{{ exam.title }}

</h4>

<p>

<b>Subject :</b>

{{ exam.subject }}

</p>

<p>

<b>Duration :</b>

{{ exam.duration }} Minutes

</p>

<a
href="/start_exam/{{ exam.id }}"
class="btn btn-primary">

▶ Start Exam

</a>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>

</html>
