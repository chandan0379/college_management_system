<!DOCTYPE html>
<html>
<head>
    <title>Upload Assignment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h2>📚 Upload Assignment</h2>
        </div>

        <div class="card-body">

            <form method="POST"
                  enctype="multipart/form-data">

                <div class="mb-3">

                    <label class="form-label">
                        Assignment Title
                    </label>

                    <input type="text"
                           name="title"
                           class="form-control"
                           placeholder="Enter assignment title"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Subject
                    </label>

                    <input type="text"
                           name="subject"
                           class="form-control"
                           placeholder="Enter subject name"
                           required>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Assignment PDF
                    </label>

                    <input type="file"
                           name="pdf"
                           class="form-control"
                           required>

                </div>

                <button type="submit"
                        class="btn btn-success">

                    Upload Assignment

                </button>

                <a href="/teacher_panel"
                   class="btn btn-secondary">

                    Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
